<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your MeetWise AI account.">
    <title>Register - MeetWise AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="auth-page-shell">
    <div class="auth-page-card card">
        <div class="auth-page-copy">
            <p class="auth-page-kicker">Step 1 of 2</p>
            <h1 class="auth-page-title">Create your account first</h1>
            <p class="auth-page-text" id="auth-reason-copy">
                Register once, then we will send you to the login screen so you can continue where you left off.
            </p>
        </div>

        <form class="auth-form" id="register-form">
            <div class="form-group">
                <label class="form-label" for="register-name">Full Name</label>
                <input class="form-input" id="register-name" type="text" autocomplete="name" placeholder="e.g. Pranjal" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="register-email">Email</label>
                <input class="form-input" id="register-email" type="email" autocomplete="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="register-password">Password</label>
                <input class="form-input" id="register-password" type="password" autocomplete="new-password" placeholder="At least 6 characters" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="register-confirm-password">Confirm Password</label>
                <input class="form-input" id="register-confirm-password" type="password" autocomplete="new-password" placeholder="Re-enter your password" required>
            </div>

            <button class="btn btn-primary btn-lg auth-submit-btn" id="register-submit-btn" type="submit">
                Create Account
            </button>
        </form>

        <div class="auth-page-footer">
            <span>Already registered?</span>
            <a class="auth-link-btn" id="login-link" href="/static/login.html">Go to login</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="/static/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/auth.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const nextUrl = MeetWiseAuth.getNextUrl('/static/dashboard.html');
    const reason = params.get('reason');

    if (reason) {
        document.getElementById('auth-reason-copy').textContent = `${reason} Create your account first, then log in and continue.`;
    }

    document.getElementById('login-link').href = MeetWiseAuth.buildAuthUrl(MeetWiseAuth.paths.login, { nextUrl });

    async function redirectIfAuthenticated() {
        await MeetWiseAuth.init();
        if (MeetWiseAuth.getUser()) {
            window.location.href = nextUrl;
        }
    }

    document.getElementById('register-form').addEventListener('submit', async (event) => {
        event.preventDefault();

        const client = await MeetWiseAuth.ensureClient();
        if (!client) return;

        const fullName = document.getElementById('register-name').value.trim();
        const email = document.getElementById('register-email').value.trim();
        const password = document.getElementById('register-password').value;
        const confirmPassword = document.getElementById('register-confirm-password').value;
        const submitButton = document.getElementById('register-submit-btn');

        if (!fullName || !email || !password || !confirmPassword) {
            showToast('Fill every field to register.', 'error');
            return;
        }

        if (password.length < 6) {
            showToast('Use a password with at least 6 characters.', 'error');
            return;
        }

        if (password !== confirmPassword) {
            showToast('Passwords do not match.', 'error');
            return;
        }

        submitButton.disabled = true;
        submitButton.textContent = 'Creating account...';

        try {
            const { data, error } = await client.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        full_name: fullName,
                    },
                },
            });

            if (error) {
                throw error;
            }

            if (data && data.session) {
                await client.auth.signOut();
            }

            showToast('Account created. Log in to continue.', 'success');

            window.setTimeout(() => {
                window.location.href = MeetWiseAuth.buildAuthUrl(MeetWiseAuth.paths.login, {
                    nextUrl,
                    registered: true,
                    email,
                });
            }, 500);
        } catch (error) {
            console.error('[auth] Registration failed:', error);
            showToast(error.message || 'Failed to register.', 'error');
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = 'Create Account';
        }
    });

    redirectIfAuthenticated();
</script>

</body>
</html>
